<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE_SYSTEM // GEOSPATIAL_VISUALIZATION</title>
    <style>
        body {
            margin: 0;
            background: #000;
            /* Added a subtle scanline/grid effect */
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .interface {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: 92%;
            height: 90%;
            border: 1px solid rgba(0, 255, 65, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .header { font-size: 1.2rem; letter-spacing: 3px; text-shadow: 0 0 10px #00FF41; }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 0.8rem;
        }

        .btn-return {
            pointer-events: auto;
            color: #00FF41;
            text-decoration: none;
            border: 1px solid #00FF41;
            padding: 10px 20px;
            background: rgba(0, 255, 65, 0.05);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-return:hover {
            background: #00FF41;
            color: #000;
            box-shadow: 0 0 20px #00FF41;
        }

        #data-stream { font-size: 10px; opacity: 0.8; line-height: 1.5; }
        
        #marker-label {
            position: absolute;
            padding: 5px 10px;
            background: rgba(0, 30, 0, 0.9);
            border: 1px solid #00FF41;
            color: #fff;
            font-size: 10px;
            pointer-events: none;
            z-index: 20;
            display: none;
            white-space: nowrap;
            box-shadow: 0 0 10px rgba(0,255,65,0.5);
        }
    </style>
</head>
<body>

    <div id="marker-label">TARGET_LOCATED: PHILIPPINES (AZHIL)</div>

    <div class="interface">
        <div class="header">
            > SYSTEM_CORE: ACTIVE<br>
            > GEOSPATIAL_VISUALIZATION_v4.02
        </div>
        <div class="footer">
            <div id="data-stream">
                IDENT: AZHIL_LEIGH_ENCINA<br>
                COORDS: 12.8797° N, 121.7740° E<br>
                STATUS: ENCRYPTED_PRESENCE
            </div>
            <a href="index.html" class="btn-return">Exit to Terminal</a>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, globeGroup, marker, ring;
        const PH_COORD = { lat: 12.8797, lon: 121.7740 };
        const RADIUS = 8; // Slightly larger for better impact
        const container = document.getElementById('canvas-container');
        const label = document.getElementById('marker-label');

        function init() {
            scene = new THREE.Scene();
            
            // Adjust FOV to make the globe feel bigger
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 18; 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            globeGroup = new THREE.Group();
            scene.add(globeGroup);

            const loader = new THREE.TextureLoader();
            loader.crossOrigin = "anonymous";
            
            // Texture Loading with Logic fix
            loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular.png', (texture) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 1024; canvas.height = 512;
                ctx.drawImage(texture.image, 0, 0, 1024, 512);
                const data = ctx.getImageData(0, 0, 1024, 512).data;

                const positions = [];
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i] > 20) { 
                        const x = (i / 4) % 1024;
                        const y = Math.floor((i / 4) / 1024);
                        const lat = (0.5 - y / 512) * Math.PI;
                        const lon = (x / 1024 - 0.5) * Math.PI * 2;
                        positions.push(
                            RADIUS * Math.cos(lat) * Math.cos(lon),
                            RADIUS * Math.sin(lat),
                            RADIUS * Math.cos(lat) * Math.sin(lon)
                        );
                    }
                }

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.06,
                    color: 0x00FF41,
                    transparent: true,
                    opacity: 0.7,
                    blending: THREE.AdditiveBlending
                });
                globeGroup.add(new THREE.Points(geometry, material));
            });

            // Calculate Coordinates
            const phi = (90 - PH_COORD.lat) * (Math.PI / 180);
            const theta = (PH_COORD.lon + 180) * (Math.PI / 180);
            const mx = -(RADIUS * Math.sin(phi) * Math.cos(theta));
            const my = RADIUS * Math.cos(phi);
            const mz = RADIUS * Math.sin(phi) * Math.sin(theta);

            // Marker
            const markerGeo = new THREE.SphereGeometry(0.18, 12, 12);
            const markerMat = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
            marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.set(mx, my, mz);
            globeGroup.add(marker);

            // Ring
            const ringGeo = new THREE.RingGeometry(0.3, 0.4, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00FF41, side: THREE.DoubleSide });
            ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.set(mx * 1.01, my * 1.01, mz * 1.01);
            ring.lookAt(0, 0, 0);
            globeGroup.add(ring);

            // --- CRITICAL FIX: ROTATE GLOBE TO FACE PHILIPPINES INITIALLY ---
            globeGroup.rotation.y = -1.5; 

            animate();
        }

        function updateHUD() {
            if (!marker) return;
            const vector = new THREE.Vector3();
            marker.getWorldPosition(vector);
            const cameraDist = camera.position.distanceTo(vector);
            
            vector.project(camera);

            const x = (vector.x * .5 + .5) * window.innerWidth;
            const y = (vector.y * -.5 + .5) * window.innerHeight;

            // Only show label if the marker is on the side facing the camera
            if (cameraDist < 18) { 
                label.style.display = 'block';
                label.style.left = `${x + 15}px`;
                label.style.top = `${y - 15}px`;
            } else {
                label.style.display = 'none';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            globeGroup.rotation.y += 0.0015; // Slow rotate
            
            if (marker) {
                const s = 1 + Math.sin(Date.now() * 0.006) * 0.4;
                marker.scale.set(s, s, s);
                if(ring) ring.scale.set(s, s, s);
            }

            updateHUD();
            renderer.render(scene, camera);
        }

        // Mouse Interactivity
        document.addEventListener('mousemove', (e) => {
            const mouseX = (e.clientX / window.innerWidth) - 0.5;
            const mouseY = (e.clientY / window.innerHeight) - 0.5;
            scene.rotation.y = mouseX * 0.2;
            scene.rotation.x = mouseY * 0.2;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
