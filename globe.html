<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE_SYSTEM // GEOSPATIAL_VISUALIZATION</title>

<style>
body {
    margin: 0;
    background: #000;
    background-image:
        linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    color: #00FF41;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
}

#canvas-container {
    position: absolute;
    inset: 0;
    z-index: 1;
}

.interface {
    position: absolute;
    z-index: 10;
    pointer-events: none;
    width: 92%;
    height: 90%;
    border: 1px solid rgba(0,255,65,0.2);
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
}

.header {
    font-size: 1.2rem;
    letter-spacing: 3px;
    text-shadow: 0 0 10px #00FF41;
}

.footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-size: 0.8rem;
}

.btn-return {
    pointer-events: auto;
    color: #00FF41;
    text-decoration: none;
    border: 1px solid #00FF41;
    padding: 10px 20px;
    background: rgba(0,255,65,0.05);
    transition: .25s;
    text-transform: uppercase;
}

.btn-return:hover {
    background: #00FF41;
    color: #000;
    box-shadow: 0 0 20px #00FF41;
}

#marker-label {
    position: absolute;
    padding: 5px 10px;
    background: rgba(0,30,0,0.9);
    border: 1px solid #00FF41;
    color: #fff;
    font-size: 10px;
    pointer-events: none;
    z-index: 20;
    display: none;
    white-space: nowrap;
    box-shadow: 0 0 10px rgba(0,255,65,0.5);
}
</style>
</head>

<body>

<div id="marker-label">TARGET_LOCATED: PHILIPPINES (AZHIL)</div>

<div class="interface">
    <div class="header">
        > SYSTEM_CORE: ACTIVE<br>
        > GEOSPATIAL_VISUALIZATION_v4.02
    </div>

    <div class="footer">
        <div>
            IDENT: AZHIL_LEIGH_ENCINA<br>
            COORDS: 12.8797° N, 121.7740° E<br>
            STATUS: ENCRYPTED_PRESENCE
            <a href="war.html" class="btn-link">> ACCESS_WAR_ROOM</a>
        </div>
        <a href="index.html" class="btn-return">Exit to Terminal</a>
    </div>
</div>

<div id="canvas-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, globeGroup, marker, ring, controls;
const PH_COORD = { lat: 12.8797, lon: 121.7740 };
const RADIUS = 8;
const container = document.getElementById('canvas-container');
const label = document.getElementById('marker-label');

init();

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 30, 120);

    camera = new THREE.PerspectiveCamera(
        50,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.set(0, 0, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 1);
    container.appendChild(renderer.domElement);

    // ⭐ INTERACTION CONTROLS
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = false;
    controls.minDistance = 12;
    controls.maxDistance = 40;

    globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // Base faint globe
    const baseGeo = new THREE.SphereGeometry(RADIUS, 40, 40);
    const baseMat = new THREE.PointsMaterial({
        size: 0.03,
        color: 0x004411,
        transparent: true,
        opacity: 0.35
    });
    globeGroup.add(new THREE.Points(baseGeo, baseMat));

    const loader = new THREE.TextureLoader();
    loader.crossOrigin = "anonymous";

    loader.load(
        "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg",
        texture => generatePointsFromTexture(texture),
        undefined,
        () => generateProceduralFallback()
    );

    setupMarkers();

    // ⭐ Auto focus Philippines on load
    focusOnPhilippines();

    animate();
}

function generatePointsFromTexture(texture) {
    const img = texture.image;

    if (!img.complete) {
        img.onload = () => generatePointsFromTexture(texture);
        return;
    }

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    const positions = [];

    for (let y = 0; y < canvas.height; y += 2) {
        for (let x = 0; x < canvas.width; x += 2) {
            const i = (y * canvas.width + x) * 4;
            const brightness = data[i] + data[i+1] + data[i+2];

            if (brightness > 200) {
                const lat = (0.5 - y / canvas.height) * Math.PI;
                const lon = (x / canvas.width - 0.5) * Math.PI * 2;

                positions.push(
                    RADIUS * Math.cos(lat) * Math.cos(lon),
                    RADIUS * Math.sin(lat),
                    RADIUS * Math.cos(lat) * Math.sin(lon)
                );
            }
        }
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute(
        'position',
        new THREE.Float32BufferAttribute(positions, 3)
    );

    const material = new THREE.PointsMaterial({
        size: 0.06,
        color: 0x00FF41,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending
    });

    globeGroup.add(new THREE.Points(geometry, material));
}

function generateProceduralFallback() {
    const geo = new THREE.IcosahedronGeometry(RADIUS, 5);
    const mat = new THREE.PointsMaterial({ size: 0.05, color: 0x00FF41 });
    globeGroup.add(new THREE.Points(geo, mat));
}

function latLonToVector3(lat, lon, radius) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);

    return new THREE.Vector3(
        -(radius * Math.sin(phi) * Math.cos(theta)),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
    );
}

function setupMarkers() {
    const pos = latLonToVector3(PH_COORD.lat, PH_COORD.lon, RADIUS);

    marker = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    marker.position.copy(pos);
    globeGroup.add(marker);

    ring = new THREE.Mesh(
        new THREE.RingGeometry(0.5, 0.7, 32),
        new THREE.MeshBasicMaterial({
            color: 0x00FF41,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.9
        })
    );
    ring.position.copy(pos.clone().multiplyScalar(1.01));
    globeGroup.add(ring);
}

function focusOnPhilippines() {
    const target = latLonToVector3(
        PH_COORD.lat,
        PH_COORD.lon,
        RADIUS
    );

    const dir = target.clone().normalize();
    camera.position.copy(dir.multiplyScalar(20));
    controls.update();
}

function updateHUD() {
    if (!marker) return;

    // ⭐ ring always faces camera
    ring.lookAt(camera.position);

    const vector = new THREE.Vector3();
    marker.getWorldPosition(vector);
    vector.project(camera);

    const x = (vector.x * .5 + .5) * window.innerWidth;
    const y = (vector.y * -.5 + .5) * window.innerHeight;

    label.style.display = 'block';
    label.style.left = `${x + 15}px`;
    label.style.top = `${y - 15}px`;
}

function animate() {
    requestAnimationFrame(animate);

    controls.update(); // ⭐ REQUIRED for damping

    // subtle idle spin only when not interacting
    if (!controls.dragging) {
        globeGroup.rotation.y += 0.0008;
    }

    const s = 1 + Math.sin(Date.now() * 0.006) * 0.25;
    marker.scale.set(s, s, s);
    ring.scale.set(s, s, s);

    updateHUD();
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
