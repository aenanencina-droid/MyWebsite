<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE_SYSTEM // GEOSPATIAL_VISUALIZATION</title>
    <style>
        body {
            margin: 0;
            background: #000;
            /* Added a subtle scanline/grid effect */
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .interface {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: 92%;
            height: 90%;
            border: 1px solid rgba(0, 255, 65, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .header { font-size: 1.2rem; letter-spacing: 3px; text-shadow: 0 0 10px #00FF41; }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 0.8rem;
        }

        .btn-return {
            pointer-events: auto;
            color: #00FF41;
            text-decoration: none;
            border: 1px solid #00FF41;
            padding: 10px 20px;
            background: rgba(0, 255, 65, 0.05);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-return:hover {
            background: #00FF41;
            color: #000;
            box-shadow: 0 0 20px #00FF41;
        }

        #data-stream { font-size: 10px; opacity: 0.8; line-height: 1.5; }
        
        #marker-label {
            position: absolute;
            padding: 5px 10px;
            background: rgba(0, 30, 0, 0.9);
            border: 1px solid #00FF41;
            color: #fff;
            font-size: 10px;
            pointer-events: none;
            z-index: 20;
            display: none;
            white-space: nowrap;
            box-shadow: 0 0 10px rgba(0,255,65,0.5);
        }
    </style>
</head>
<body>

    <div id="marker-label">TARGET_LOCATED: PHILIPPINES (AZHIL)</div>

    <div class="interface">
        <div class="header">
            > SYSTEM_CORE: ACTIVE<br>
            > GEOSPATIAL_VISUALIZATION_v4.02
        </div>
        <div class="footer">
            <div id="data-stream">
                IDENT: AZHIL_LEIGH_ENCINA<br>
                COORDS: 12.8797° N, 121.7740° E<br>
                STATUS: ENCRYPTED_PRESENCE
            </div>
            <a href="index.html" class="btn-return">Exit to Terminal</a>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
    let scene, camera, renderer, globeGroup, marker, ring;
    const PH_COORD = { lat: 12.8797, lon: 121.7740 };
    const RADIUS = 8; 
    const container = document.getElementById('canvas-container');
    const label = document.getElementById('marker-label');

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 20; 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // --- THE FIX: Create a "Grid Globe" as a base so it's never empty ---
        const sphereGeo = new THREE.SphereGeometry(RADIUS, 40, 40);
        const sphereMat = new THREE.PointsMaterial({
            size: 0.03,
            color: 0x004411, // Darker green for the background grid
            transparent: true,
            opacity: 0.3
        });
        const baseGrid = new THREE.Points(sphereGeo, sphereMat);
        globeGroup.add(baseGrid);

        // --- GUARANTEED MAP LOADING ---
        const loader = new THREE.TextureLoader();
        loader.crossOrigin = "Anonymous";
        
        // Attempt to load the landmass data
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular.png', 
            (texture) => {
                generatePointsFromTexture(texture);
            },
            undefined,
            (err) => {
                console.warn("External texture blocked. Using procedural fallback.");
                generateProceduralStars();
            }
        );

        setupMarkers();
        globeGroup.rotation.y = -1.5; 
        animate();
    }

    function generatePointsFromTexture(texture) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 256;
        ctx.drawImage(texture.image, 0, 0, 512, 256);
        const data = ctx.getImageData(0, 0, 512, 256).data;

        const positions = [];
        for (let i = 0; i < data.length; i += 4) {
            if (data[i] > 20) { 
                const x = (i / 4) % 512;
                const y = Math.floor((i / 4) / 512);
                const lat = (0.5 - y / 256) * Math.PI;
                const lon = (x / 512 - 0.5) * Math.PI * 2;
                positions.push(
                    RADIUS * Math.cos(lat) * Math.cos(lon),
                    RADIUS * Math.sin(lat),
                    RADIUS * Math.cos(lat) * Math.sin(lon)
                );
            }
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({
            size: 0.07,
            color: 0x00FF41,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        globeGroup.add(new THREE.Points(geometry, material));
    }

    function generateProceduralStars() {
        // This adds extra green "data points" if the map fails
        const geo = new THREE.IcosahedronGeometry(RADIUS, 5);
        const mat = new THREE.PointsMaterial({ size: 0.05, color: 0x00FF41 });
        globeGroup.add(new THREE.Points(geo, mat));
    }

    function setupMarkers() {
        const phi = (90 - PH_COORD.lat) * (Math.PI / 180);
        const theta = (PH_COORD.lon + 180) * (Math.PI / 180);
        const mx = -(RADIUS * Math.sin(phi) * Math.cos(theta));
        const my = RADIUS * Math.cos(phi);
        const mz = RADIUS * Math.sin(phi) * Math.sin(theta);

        marker = new THREE.Mesh(
            new THREE.SphereGeometry(0.2, 12, 12),
            new THREE.MeshBasicMaterial({ color: 0xFFFFFF })
        );
        marker.position.set(mx, my, mz);
        globeGroup.add(marker);

        ring = new THREE.Mesh(
            new THREE.RingGeometry(0.4, 0.5, 32),
            new THREE.MeshBasicMaterial({ color: 0x00FF41, side: THREE.DoubleSide })
        );
        ring.position.set(mx * 1.01, my * 1.01, mz * 1.01);
        ring.lookAt(0, 0, 0);
        globeGroup.add(ring);
    }

    function updateHUD() {
        if (!marker) return;
        const vector = new THREE.Vector3();
        marker.getWorldPosition(vector);
        const cameraDist = camera.position.distanceTo(vector);
        vector.project(camera);

        const x = (vector.x * .5 + .5) * window.innerWidth;
        const y = (vector.y * -.5 + .5) * window.innerHeight;

        if (cameraDist < 20) { 
            label.style.display = 'block';
            label.style.left = `${x + 15}px`;
            label.style.top = `${y - 15}px`;
        } else {
            label.style.display = 'none';
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        globeGroup.rotation.y += 0.0015;
        if (marker) {
            const s = 1 + Math.sin(Date.now() * 0.006) * 0.3;
            marker.scale.set(s, s, s);
            ring.scale.set(s, s, s);
        }
        updateHUD();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
