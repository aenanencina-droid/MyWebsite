<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE_SYSTEM // GEOSPATIAL_VISUALIZATION</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:monospace;
    color:#00ff41;
}

/* BACK BUTTON */
#backBtn{
    position:fixed;
    top:15px;
    left:15px;
    z-index:10;
    padding:10px 16px;
    background:#000;
    border:1px solid #00ff41;
    color:#00ff41;
    cursor:pointer;
}

#backBtn:hover{
    background:#001a00;
}

/* CROSSHAIR */
.crosshair{
    position:fixed;
    pointer-events:none;
    width:22px;
    height:22px;
    border:2px solid #00ff41;
    border-radius:50%;
    transform:translate(-50%,-50%);
    z-index:9;
}

.crosshair::before,
.crosshair::after{
    content:"";
    position:absolute;
    background:#00ff41;
}

.crosshair::before{
    width:2px;
    height:22px;
    left:50%;
    transform:translateX(-50%);
}

.crosshair::after{
    height:2px;
    width:22px;
    top:50%;
    transform:translateY(-50%);
}
</style>
</head>
<body>

<button id="backBtn" onclick="window.location.href='index.html'">
← BACK TO CORE
</button>

<canvas id="canvas"></canvas>
<div class="crosshair" id="crosshair"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const crosshair = document.getElementById("crosshair");

let width, height;
let projectiles = [];
let explosions = [];
let smokeParticles = [];

/* ================= RESIZE ================= */
function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ================= MAP ================= */
function drawMap(){

    // --- subtle background grid ---
    ctx.strokeStyle = "rgba(0,255,65,0.08)";
    ctx.lineWidth = 1;

    for(let x=0;x<width;x+=40){
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,height);
        ctx.stroke();
    }

    for(let y=0;y<height;y+=40){
        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(width,y);
        ctx.stroke();
    }

    // =============================
    // GREEN WORLD MAP (vector style)
    // =============================

    ctx.strokeStyle = "rgba(0,255,65,0.35)";
    ctx.lineWidth = 2;

    ctx.beginPath();

    // rough continents (stylized tactical look)

    // North America
    ctx.moveTo(width*0.18, height*0.32);
    ctx.lineTo(width*0.22, height*0.25);
    ctx.lineTo(width*0.27, height*0.28);
    ctx.lineTo(width*0.26, height*0.36);
    ctx.lineTo(width*0.21, height*0.38);
    ctx.closePath();

    // South America
    ctx.moveTo(width*0.28, height*0.45);
    ctx.lineTo(width*0.31, height*0.55);
    ctx.lineTo(width*0.29, height*0.68);
    ctx.lineTo(width*0.25, height*0.58);
    ctx.closePath();

    // Europe/Africa
    ctx.moveTo(width*0.48, height*0.30);
    ctx.lineTo(width*0.52, height*0.28);
    ctx.lineTo(width*0.55, height*0.35);
    ctx.lineTo(width*0.53, height*0.55);
    ctx.lineTo(width*0.49, height*0.52);
    ctx.lineTo(width*0.47, height*0.40);
    ctx.closePath();

    // Asia
    ctx.moveTo(width*0.58, height*0.28);
    ctx.lineTo(width*0.72, height*0.26);
    ctx.lineTo(width*0.76, height*0.38);
    ctx.lineTo(width*0.70, height*0.44);
    ctx.lineTo(width*0.60, height*0.40);
    ctx.closePath();

    // Australia
    ctx.moveTo(width*0.72, height*0.65);
    ctx.lineTo(width*0.77, height*0.66);
    ctx.lineTo(width*0.76, height*0.72);
    ctx.lineTo(width*0.71, height*0.71);
    ctx.closePath();

    ctx.stroke();

    // ===== GREEN BORDER =====
    ctx.strokeStyle = "#00ff41";
    ctx.lineWidth = 2;
    ctx.strokeRect(2,2,width-4,height-4);
}

/* ================= PROJECTILE ================= */
function launchProjectile(x,y,type="MISSILE"){

    const speed = type === "NUKE" ? 0.0025 : 0.006;

    projectiles.push({
        startX: width/2,
        startY: height,
        targetX: x,
        targetY: y,
        progress: 0,
        speed,
        type
    });
}

/* ================= EXPLOSION ================= */
function createExplosion(x,y,type){
    explosions.push({
        x,y,
        radius:0,
        max: type==="NUKE"?180:90,
        alpha:1
    });
}

/* ================= MOUSE ================= */
window.addEventListener("mousemove", e=>{
    crosshair.style.left = e.clientX+"px";
    crosshair.style.top = e.clientY+"px";
});

window.addEventListener("click", e=>{
    const type = Math.random() < 0.25 ? "NUKE" : "MISSILE";
    launchProjectile(e.clientX, e.clientY, type);
});

/* ================= ANIMATION ================= */
function animate(){

    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(0,0,width,height);

    drawMap();

    // ===== PROJECTILES =====
    for(let i=projectiles.length-1;i>=0;i--){
        const p = projectiles[i];
        p.progress += p.speed;

        const x = p.startX + (p.targetX - p.startX)*p.progress;
        const y = p.startY + (p.targetY - p.startY)*p.progress
                  - Math.sin(p.progress*Math.PI)*200;

        // smoke trail
        smokeParticles.push({
            x,y,
            r: p.type==="NUKE"?4:2,
            a:0.5
        });

        // missile head
        ctx.fillStyle = p.type==="NUKE" ? "#ff3333" : "#00ff41";
        ctx.beginPath();
        ctx.arc(x,y, p.type==="NUKE"?5:3, 0, Math.PI*2);
        ctx.fill();

        if(p.progress >= 1){
            createExplosion(p.targetX, p.targetY, p.type);
            projectiles.splice(i,1);
        }
    }

    // ===== SMOKE =====
    for(let i=smokeParticles.length-1;i>=0;i--){
        const s = smokeParticles[i];
        s.a -= 0.01;
        s.r += 0.15;

        ctx.fillStyle = `rgba(0,255,65,${s.a})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fill();

        if(s.a <= 0) smokeParticles.splice(i,1);
    }

    // ===== EXPLOSIONS =====
    for(let i=explosions.length-1;i>=0;i--){
        const ex = explosions[i];
        ex.radius += 3;
        ex.alpha -= 0.015;

        ctx.strokeStyle = `rgba(0,255,65,${ex.alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ex.x, ex.y, ex.radius, 0, Math.PI*2);
        ctx.stroke();

        if(ex.alpha <= 0) explosions.splice(i,1);
    }

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
