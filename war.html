<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL // WAR_ROOM</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    background: #000;
    color: #00FF41;
    font-family: 'Courier New', monospace;
    overflow: hidden;
}

/* Canvas */
#war-canvas {
    display: block;
    background: radial-gradient(circle, #001a00 0%, #000 100%);
}

/* Overlay */
.ui-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
}

/* Status */
#status-msg {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,40,0,0.95);
    padding: 14px 28px;
    border: 2px solid #00FF41;
    font-weight: bold;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(0,255,65,.35);
    pointer-events: auto;
    z-index: 100;
}

/* Side menu */
#side-menu {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: none;
    flex-direction: column;
    gap: 12px;
    pointer-events: auto;
}

.weapon-btn {
    background: rgba(0,20,0,.85);
    border: 1px solid #00FF41;
    color: #00FF41;
    padding: 14px;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 12px;
    transition: .25s;
}

.weapon-btn:hover {
    background: #00FF41;
    color: #000;
}

.weapon-btn.active {
    background: #ff3333;
    border-color: #ff3333;
    color: #fff;
}
</style>
</head>

<body>

<canvas id="war-canvas"></canvas>

<div class="ui-layer">
    <div id="status-msg">
        Click anywhere to begin — Select Home Base
    </div>

    <div id="side-menu">
        <div style="font-size:10px;opacity:.7;">WEAPON_SYSTEMS</div>
        <button class="weapon-btn" data-type="MISSILE">Tactical Missile</button>
        <button class="weapon-btn" data-type="NUKE">Thermonuclear</button>
        <button class="weapon-btn" id="resetBtn"
            style="margin-top:14px;border-color:#555;color:#777;">
            Reset SIM
        </button>
    </div>
</div>

<script>
const canvas = document.getElementById('war-canvas');
const ctx = canvas.getContext('2d');
const statusMsg = document.getElementById('status-msg');
const sideMenu = document.getElementById('side-menu');

let width, height;

/* =========================
   GAME STATE
========================= */
let state = "INIT"; // INIT → BASE_SET → ARMED
let basePos = null;
let selectedWeapon = null;
let mouse = {x:0,y:0};

let projectiles = [];
let explosions = [];

/* =========================
   MAP
========================= */
const mapImg = new Image();
mapImg.src = "https://raw.githubusercontent.com/djaiss/mapsicon/master/all/world/512.png";

/* =========================
   RESIZE
========================= */
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* =========================
   INPUT
========================= */
canvas.addEventListener("mousemove", e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

canvas.addEventListener("mousedown", e=>{
    const x = e.clientX;
    const y = e.clientY;

    // STEP 1 — place base
    if(state === "INIT"){
        basePos = {x,y};
        state = "BASE_SET";
        statusMsg.innerText = "Command Established — Select Weapon";
        sideMenu.style.display = "flex";
        setTimeout(()=> statusMsg.style.display="none",1800);
        return;
    }

    // STEP 2 — fire weapon
    if(state === "ARMED" && selectedWeapon){
        launch(basePos,{x,y},selectedWeapon);
    }
});

/* =========================
   WEAPON BUTTONS
========================= */
document.querySelectorAll(".weapon-btn[data-type]")
.forEach(btn=>{
    btn.addEventListener("click",()=>{
        document.querySelectorAll(".weapon-btn")
            .forEach(b=>b.classList.remove("active"));

        btn.classList.add("active");
        selectedWeapon = btn.dataset.type;
        state = "ARMED";
        canvas.style.cursor = "crosshair";
    });
});

/* RESET */
document.getElementById("resetBtn").onclick = resetSim;

/* =========================
   LAUNCH
========================= */
function launch(start,end,type){
    projectiles.push({
        start:{...start},
        end:{...end},
        progress:0,
        speed: type==="NUKE"?0.004:0.012,
        arc: Math.random()*120+120,
        type
    });
}

/* =========================
   DRAW MAP
========================= */
function drawMap(){
    ctx.globalAlpha = 0.18;

    const size = Math.min(width,height)*0.9;
    const x = (width-size)/2;
    const y = (height-size)/2;

    ctx.drawImage(mapImg,x,y,size,size);
    ctx.globalAlpha = 1;

    // grid
    ctx.strokeStyle = "rgba(0,255,65,0.05)";
    for(let i=0;i<width;i+=40){
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,height); ctx.stroke();
    }
    for(let i=0;i<height;i+=40){
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(width,i); ctx.stroke();
    }
}

/* =========================
   ANIMATE
========================= */
function animate(){
    ctx.fillStyle = "rgba(0,10,0,.25)";
    ctx.fillRect(0,0,width,height);

    drawMap();

    /* HQ */
    if(basePos){
        ctx.strokeStyle="#00FF41";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(basePos.x,basePos.y,10,0,Math.PI*2);
        ctx.stroke();

        ctx.fillStyle="#00FF41";
        ctx.fillText("HQ_NODE",basePos.x+14,basePos.y+4);
    }

    /* crosshair when armed */
    if(state==="ARMED"){
        ctx.strokeStyle="rgba(255,80,80,.8)";
        ctx.beginPath();
        ctx.arc(mouse.x,mouse.y,12,0,Math.PI*2);
        ctx.moveTo(mouse.x-18,mouse.y);
        ctx.lineTo(mouse.x+18,mouse.y);
        ctx.moveTo(mouse.x,mouse.y-18);
        ctx.lineTo(mouse.x,mouse.y+18);
        ctx.stroke();
    }

    /* PROJECTILES */
    for(let i=projectiles.length-1;i>=0;i--){
        const p = projectiles[i];
        p.progress += p.speed;

        const t = p.progress;
        const cx = (p.start.x+p.end.x)/2;
        const cy = (p.start.y+p.end.y)/2 - p.arc;

        // quadratic bezier
        const x =
            (1-t)*(1-t)*p.start.x +
            2*(1-t)*t*cx +
            t*t*p.end.x;

        const y =
            (1-t)*(1-t)*p.start.y +
            2*(1-t)*t*cy +
            t*t*p.end.y;

        // trail
        ctx.strokeStyle = p.type==="NUKE" ? "#ff3333" : "#00FF41";
        ctx.setLineDash([6,6]);
        ctx.beginPath();
        ctx.moveTo(p.start.x,p.start.y);
        ctx.quadraticCurveTo(cx,cy,x,y);
        ctx.stroke();
        ctx.setLineDash([]);

        // head
        ctx.fillStyle="#fff";
        ctx.fillRect(x-2,y-2,4,4);

        if(p.progress>=1){
            explosions.push({
                x:p.end.x,
                y:p.end.y,
                r:0,
                max:p.type==="NUKE"?90:35,
                color:p.type==="NUKE"?"255,60,0":"0,255,65"
            });
            projectiles.splice(i,1);
        }
    }

    /* EXPLOSIONS */
    for(let i=explosions.length-1;i>=0;i--){
        const e = explosions[i];
        e.r += 2.5;

        ctx.beginPath();
        ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${e.color},${1-e.r/e.max})`;
        ctx.fill();

        if(e.r>=e.max) explosions.splice(i,1);
    }

    requestAnimationFrame(animate);
}

/* =========================
   RESET
========================= */
function resetSim(){
    state="INIT";
    basePos=null;
    selectedWeapon=null;
    projectiles=[];
    explosions=[];
    sideMenu.style.display="none";
    statusMsg.style.display="block";
    statusMsg.innerText="Click anywhere to begin — Select Home Base";
    canvas.style.cursor="default";
}

/* START */
animate();
</script>
</body>
</html>
