<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL // WAR_ROOM</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    background: #000;
    color: #00FF41;
    font-family: 'Courier New', monospace;
    overflow: hidden;
}

#war-canvas {
    display: block;
    background: radial-gradient(circle, #001a00 0%, #000 100%);
}

.ui-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
}

#status-msg {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,40,0,0.95);
    padding: 14px 28px;
    border: 2px solid #00FF41;
    font-weight: bold;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(0,255,65,.35);
    pointer-events: auto;
    z-index: 100;
}

#side-menu {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: none;
    flex-direction: column;
    gap: 12px;
    pointer-events: auto;
}

.weapon-btn {
    background: rgba(0,20,0,.85);
    border: 1px solid #00FF41;
    color: #00FF41;
    padding: 14px;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 12px;
    transition: .25s;
}

.weapon-btn:hover {
    background: #00FF41;
    color: #000;
}

.weapon-btn.active {
    background: #ff3333;
    border-color: #ff3333;
    color: #fff;
}

.back-btn {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: #00FF41;
    text-decoration: none;
    font-size: 12px;
    pointer-events: auto;
}
</style>
</head>

<body>

<canvas id="war-canvas"></canvas>

<div class="ui-layer">
    <div id="status-msg">
        Click anywhere to begin — Select Home Base
    </div>

    <div id="side-menu">
        <div style="font-size:10px;opacity:.7;">WEAPON_SYSTEMS</div>
        <button class="weapon-btn" data-type="MISSILE">Tactical Missile</button>
        <button class="weapon-btn" data-type="NUKE">Thermonuclear</button>
        <button class="weapon-btn" id="resetBtn"
            style="margin-top:14px;border-color:#555;color:#777;">
            Reset SIM
        </button>
    </div>

    <a href="index.html" class="back-btn">> RETURN_TO_CORE</a>
</div>

<script>
const canvas = document.getElementById('war-canvas');
const ctx = canvas.getContext('2d');
const statusMsg = document.getElementById('status-msg');
const sideMenu = document.getElementById('side-menu');

let width, height;
let mapLoaded = false;

/* ================= STATE ================= */
let state = "INIT";
let basePos = null;
let selectedWeapon = null;
let mouse = {x:0,y:0};

let projectiles = [];
let explosions = [];
let smokeParticles = [];

/* ================= MAP ================= */
const mapImg = new Image();
mapImg.crossOrigin = "anonymous";
mapImg.src = "https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg";
mapImg.onload = () => mapLoaded = true;

/* ================= RESIZE ================= */
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ================= INPUT ================= */
canvas.addEventListener("mousemove", e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

canvas.addEventListener("mousedown", e=>{
    const x = e.clientX;
    const y = e.clientY;

    if(state === "INIT"){
        basePos = {x,y};
        state = "BASE_SET";
        statusMsg.innerText = "Command Established — Select Weapon";
        sideMenu.style.display = "flex";
        setTimeout(()=> statusMsg.style.display="none",1800);
        return;
    }

    if(state === "ARMED" && selectedWeapon){
        launch(basePos,{x,y},selectedWeapon);
    }
});

/* ================= BUTTONS ================= */
document.querySelectorAll(".weapon-btn[data-type]")
.forEach(btn=>{
    btn.addEventListener("click",()=>{
        document.querySelectorAll(".weapon-btn")
            .forEach(b=>b.classList.remove("active"));

        btn.classList.add("active");
        selectedWeapon = btn.dataset.type;
        state = "ARMED";
        canvas.style.cursor = "crosshair";
    });
});

document.getElementById("resetBtn").onclick = resetSim;

/* ================= LAUNCH ================= */
function launch(start,end,type){
    projectiles.push({
        start:{...start},
        end:{...end},
        progress:0,
        speed: type==="NUKE"?0.004:0.012,
        arc: Math.random()*120+120,
        type
    });
}

/* ================= DRAW MAP ================= */
function drawMap(){

    if(mapLoaded){
        // map
        ctx.globalAlpha = 0.65;
        ctx.drawImage(mapImg, 0, 0, width, height);
        ctx.globalAlpha = 1;

        // ✅ GREEN BORDER AROUND WORLD
        ctx.strokeStyle = "rgba(0,255,65,0.35)";
        ctx.lineWidth = 2;
        ctx.strokeRect(10, 10, width-20, height-20);
    }

    // grid
    ctx.strokeStyle = "rgba(0,255,65,0.08)";
    ctx.lineWidth = 1;

    for(let i=0;i<width;i+=40){
        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,height);
        ctx.stroke();
    }

    for(let i=0;i<height;i+=40){
        ctx.beginPath();
        ctx.moveTo(0,i);
        ctx.lineTo(width,i);
        ctx.stroke();
    }
}

/* ================= ANIMATE ================= */
function animate(){
    ctx.fillStyle = "rgba(0,10,0,.25)";
    ctx.fillRect(0,0,width,height);

    drawMap();

    /* HQ */
    if(basePos){
        ctx.strokeStyle="#00FF41";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(basePos.x,basePos.y,10,0,Math.PI*2);
        ctx.stroke();

        ctx.fillStyle="#00FF41";
        ctx.fillText("HQ_NODE",basePos.x+14,basePos.y+4);
    }

    /* crosshair */
    if(state==="ARMED"){
        ctx.strokeStyle="rgba(255,80,80,.9)";
        ctx.beginPath();
        ctx.arc(mouse.x,mouse.y,12,0,Math.PI*2);
        ctx.moveTo(mouse.x-18,mouse.y);
        ctx.lineTo(mouse.x+18,mouse.y);
        ctx.moveTo(mouse.x,mouse.y-18);
        ctx.lineTo(mouse.x,mouse.y+18);
        ctx.stroke();
    }

    /* PROJECTILES */
    for(let i=projectiles.length-1;i>=0;i--){
        const p = projectiles[i];
        p.progress += p.speed;

        const t = p.progress;
        const cx = (p.start.x+p.end.x)/2;
        const cy = (p.start.y+p.end.y)/2 - p.arc;

        const x =
            (1-t)*(1-t)*p.start.x +
            2*(1-t)*t*cx +
            t*t*p.end.x;

        const y =
            (1-t)*(1-t)*p.start.y +
            2*(1-t)*t*cy +
            t*t*p.end.y;

        // smoke
        smokeParticles.push({
            x, y,
            r: p.type==="NUKE"?6:4,
            life: 1,
            decay: p.type==="NUKE"?0.015:0.025
        });

        // missile head
        ctx.fillStyle = p.type==="NUKE" ? "#ff5533" : "#ffffff";
        ctx.beginPath();
        ctx.arc(x,y,4,0,Math.PI*2);
        ctx.fill();

        if(p.progress>=1){
            explosions.push({
                x:p.end.x,
                y:p.end.y,
                r:0,
                max:p.type==="NUKE"?90:35,
                color:p.type==="NUKE"?"255,60,0":"0,255,65"
            });
            projectiles.splice(i,1);
        }
    }

    /* SMOKE */
    for(let i=smokeParticles.length-1;i>=0;i--){
        const s = smokeParticles[i];
        s.life -= s.decay;
        s.r += 0.15;

        ctx.fillStyle = `rgba(200,200,200,${s.life*0.4})`;
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();

        if(s.life <= 0) smokeParticles.splice(i,1);
    }

    /* EXPLOSIONS */
    for(let i=explosions.length-1;i>=0;i--){
        const e = explosions[i];
        e.r += 2.5;

        ctx.beginPath();
        ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${e.color},${1-e.r/e.max})`;
        ctx.fill();

        if(e.r>=e.max) explosions.splice(i,1);
    }

    requestAnimationFrame(animate);
}

/* ================= RESET ================= */
function resetSim(){
    state="INIT";
    basePos=null;
    selectedWeapon=null;
    projectiles=[];
    explosions=[];
    smokeParticles=[];
    sideMenu.style.display="none";
    statusMsg.style.display="block";
    statusMsg.innerText="Click anywhere to begin — Select Home Base";
    canvas.style.cursor="default";
}

animate();
</script>
</body>
</html>
