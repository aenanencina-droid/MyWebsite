<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Path | Neural Walk</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; height: 600vh; /* Increased height for 5th panel */ }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* HUD Overlay */
        #hud {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            border: 2px solid rgba(0, 255, 204, 0.1);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }

        .hud-stats { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; line-height: 1.5; }

        .exit-btn {
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .exit-btn:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 15px #00ffcc;
        }

        /* 3D LABEL STYLES */
        .billboard-label {
            position: absolute;
            top: 0; left: 0;
            color: #00ffcc;
            padding: 10px;
            pointer-events: none;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc;
            text-transform: uppercase;
            white-space: nowrap;
            z-index: 5;
            transition: opacity 0.3s;
        }

        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            animation: pulse 2s infinite;
            font-size: 12px;
            letter-spacing: 3px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-header">
            <div class="hud-stats">
                [ DEPTH_STABILIZED ]<br>
                [ VELOCITY: <span id="speed">0</span> km/h ]<br>
                [ SECTOR: ARCHIVE_ZERO ]
            </div>
            <a href="index.html" class="exit-btn">← EXIT_TO_CORE</a>
        </div>
        <div id="labels-container"></div> <div class="scroll-indicator">▼ SCROLL_INTO_THE_VOID ▼</div>
    </div>

    <script>
        let scene, camera, renderer, grid;
        const projects = [];
        const labelContainer = document.getElementById('labels-container');

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.07);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 5); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Neon Floor Grid
            const gridHelper = new THREE.GridHelper(400, 100, 0x00ffcc, 0x002222);
            gridHelper.position.y = 0;
            scene.add(gridHelper);

            // UPDATED Project Data with your info
            const projectData = [
                { name: "Azhil Leigh Encina", color: 0x00ffcc, z: -15, x: -3 },
                { name: "Web/App Developer", color: 0x00ffcc, z: -35, x: 3 },
                { name: "Taguig City University", color: 0x00ffcc, z: -55, x: -3 },
                { name: "Esports Athlete", color: 0xff0055, z: -75, x: 3 },
                { name: "CICT", color: 0x00ffcc, z: -95, x: -3 }
            ];

            projectData.forEach(data => {
                // Create Plane
                const geometry = new THREE.PlaneGeometry(5, 2.5);
                const material = new THREE.MeshBasicMaterial({ 
                    color: data.color, 
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.4,
                    wireframe: true
                });
                const plane = new THREE.Mesh(geometry, material);
                plane.position.set(data.x, 2, data.z);
                scene.add(plane);

                // Create HTML Label
                const div = document.createElement('div');
                div.className = 'billboard-label';
                div.innerHTML = `> ${data.name}`;
                labelContainer.appendChild(div);

                projects.push({ mesh: plane, element: div, data: data });
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.003;
            
            // Head Bob
            if (window.scrollY > 5) {
                camera.position.y = 1.6 + Math.sin(time) * 0.04;
                camera.rotation.z = Math.sin(time * 0.5) * 0.005;
            }

            // Scroll Sync
            const scrollPercent = window.scrollY / (document.body.offsetHeight - window.innerHeight);
            camera.position.z = 5 - (scrollPercent * 140); // Adjusted for 5 panels

            // Speed HUD
            document.getElementById('speed').innerText = (window.scrollY * 0.15).toFixed(0);

            projects.forEach(p => {
                p.mesh.rotation.y = Math.sin(time * 0.5) * 0.1;
                const dist = Math.abs(camera.position.z - p.mesh.position.z);
                
                // Opacity logic
                const opacity = dist < 20 ? 0.8 : 0.1;
                p.mesh.material.opacity = opacity;

                // Sync HTML label position to 3D mesh
                const vector = new THREE.Vector3();
                p.mesh.getWorldPosition(vector);
                vector.project(camera);

                if(vector.z < 1 && dist < 30) { // Only show if in front of camera and nearby
                    p.element.style.display = 'block';
                    p.element.style.opacity = opacity;
                    const x = (vector.x * .5 + .5) * window.innerWidth;
                    const y = (vector.y * -.5 + .5) * window.innerHeight;
                    p.element.style.transform = `translate(-50%, -50%) translate(${x}px,${y}px)`;
                } else {
                    p.element.style.display = 'none';
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
