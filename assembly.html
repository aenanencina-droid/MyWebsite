<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Path | Neural Walk</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; height: 900vh; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* HUD Overlay */
        #hud {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            border: 2px solid rgba(0, 255, 204, 0.1);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .hud-header { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        .hud-stats { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; line-height: 1.5; }

        .exit-btn {
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .exit-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }

        /* NEON BILLBOARD LABEL */
        .billboard-label {
            position: absolute;
            top: 0; left: 0;
            color: #fff;
            padding: 20px;
            pointer-events: none;
            /* High-intensity neon glow */
            text-shadow: 0 0 5px #00ffcc, 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            text-transform: uppercase;
            z-index: 5;
            text-align: center;
            width: 320px;
            white-space: normal; 
            opacity: 0;
            transition: opacity 0.2s ease-out;
            filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.5));
        }

        .label-main { font-size: 1.4rem; font-weight: bold; display: block; letter-spacing: 2px; margin-bottom: 8px; }
        .label-sub { font-size: 0.8rem; letter-spacing: 4px; display: block; color: #00ffcc; }

        .scroll-indicator {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            animation: pulse 2s infinite; font-size: 12px; letter-spacing: 3px;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-header">
            <div class="hud-stats">
                [ DEPTH_STABILIZED ]<br>
                [ VELOCITY: <span id="speed">0</span> km/h ]<br>
                [ SECTOR: ARCHIVE_ZERO ]
            </div>
            <a href="index.html" class="exit-btn">← EXIT_TO_CORE</a>
        </div>
        <div id="labels-container"></div> 
        <div class="scroll-indicator">▼ SCROLL_TO_SURF_THE_NETWORK ▼</div>
    </div>

    <script>
        let scene, camera, renderer, floorLines = [];
        const projects = [];
        const labelContainer = document.getElementById('labels-container');

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.06);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.8, 25); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. NEON FLOOR LINES (The "Moving" Effect)
            const lineCount = 14;
            const lineSpacing = 3;
            for(let i = 0; i < lineCount; i++) {
                const xPos = (i - (lineCount/2)) * lineSpacing;
                const points = [new THREE.Vector3(xPos, 0, 50), new THREE.Vector3(xPos, 0, -500)];
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.2 });
                const line = new THREE.Line(geometry, material);
                scene.add(line);
                floorLines.push(line);
            }

            // 2. PROJECT DATA
            const projectData = [
                { name: "Azhil Leigh Encina", sub: "- STUDENT -", z: -20, x: -5 },
                { name: "Web/App Developer", sub: "- PYTHON -", z: -60, x: 5 },
                { name: "Taguig City University", sub: "- BSCS -", z: -100, x: -5 },
                { name: "Esports Athlete", sub: "- MLBB -", z: -140, x: 5 },
                { name: "CICT", sub: "- WEB DEVELOPMENT FIELD -", z: -180, x: -5 }
            ];

            projectData.forEach(data => {
                // Billboard Group
                const group = new THREE.Group();
                
                // Neon Frame (The Wireframe)
                const frameGeo = new THREE.PlaneGeometry(7, 3.5);
                const frameMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.8 });
                const frame = new THREE.Mesh(frameGeo, frameMat);
                
                // Solid Background (Glass effect)
                const bgMat = new THREE.MeshBasicMaterial({ color: 0x002222, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
                const bg = new THREE.Mesh(frameGeo, bgMat);
                
                // Edge Glow (Simple thin lines around the edge)
                const edges = new THREE.EdgesGeometry(frameGeo);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffcc }));
                
                group.add(bg);
                group.add(frame);
                group.add(line);
                
                group.position.set(data.x, 2.5, data.z);
                scene.add(group);

                const div = document.createElement('div');
                div.className = 'billboard-label';
                div.innerHTML = `<span class="label-main">${data.name}</span><span class="label-sub">${data.sub}</span>`;
                labelContainer.appendChild(div);

                projects.push({ group: group, element: div, zPos: data.z, frame: frame });
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.002;
            
            // Scroll logic
            const scrollPercent = window.scrollY / (document.body.offsetHeight - window.innerHeight);
            camera.position.z = 25 - (scrollPercent * 250);

            // Velocity Display
            document.getElementById('speed').innerText = (window.scrollY * 0.12).toFixed(0);

            // Animate Floor (Texture offset simulation)
            // Note: In a true infinite floor we'd move lines, here we just tilt the camera slightly
            camera.position.y = 1.8 + Math.sin(time) * 0.05;

            projects.forEach(p => {
                const distance = Math.abs(camera.position.z - p.zPos);
                
                // Highlight & Fade logic
                let opacity = 0;
                if (distance < 40) {
                    opacity = 1 - (distance / 40);
                    // Pass-through check
                    if (camera.position.z < p.zPos) opacity *= 0.1; 
                }

                // Apply neon flicker occasionally
                const flicker = Math.random() > 0.98 ? 0.2 : 1.0;
                
                p.group.children.forEach(child => {
                    if(child.material) child.material.opacity = opacity * (child.material.wireframe ? 0.8 : 0.4) * flicker;
                });
                
                p.element.style.opacity = opacity * flicker;

                // Sync Position
                const vector = new THREE.Vector3();
                p.group.getWorldPosition(vector);
                vector.project(camera);

                if(vector.z < 1 && opacity > 0.05) {
                    p.element.style.display = 'block';
                    const x = (vector.x * .5 + .5) * window.innerWidth;
                    const y = (vector.y * -.5 + .5) * window.innerHeight;
                    p.element.style.transform = `translate(-50%, -50%) translate(${x}px,${y}px)`;
                } else {
                    p.element.style.display = 'none';
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
