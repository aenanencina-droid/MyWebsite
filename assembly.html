<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Path | Neural Walk</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; height: 1000vh; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            border: 2px solid rgba(0, 255, 204, 0.2);
            box-sizing: border-box; display: flex; flex-direction: column;
            justify-content: space-between; padding: 30px;
        }

        .hud-header { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        .hud-stats { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; line-height: 1.5; }

        .exit-btn {
            background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 1px solid #00ffcc;
            padding: 10px 20px; cursor: pointer; text-transform: uppercase;
            font-family: inherit; font-weight: bold; letter-spacing: 2px;
            transition: all 0.3s ease; text-decoration: none; display: inline-block;
        }
        .exit-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; }

        .billboard-label {
            position: absolute; top: 0; left: 0; color: #fff; padding: 20px;
            pointer-events: none; text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            text-transform: uppercase; z-index: 5; text-align: center;
            width: 320px; opacity: 0; transition: opacity 0.3s ease;
        }

        .label-main { font-size: 1.6rem; font-weight: bold; display: block; letter-spacing: 2px; margin-bottom: 8px; }
        .label-sub { font-size: 0.9rem; letter-spacing: 4px; display: block; color: #00ffcc; font-weight: bold; }

        .scroll-indicator {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            animation: pulse 2s infinite; font-size: 12px; letter-spacing: 3px;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-header">
            <div class="hud-stats">
                [ NEURAL_PATH: CONNECTED ]<br>
                [ VELOCITY: <span id="speed">0</span> km/h ]<br>
                [ SECTOR: ARCHIVE_ZERO ]
            </div>
            <a href="index.html" class="exit-btn">← TERMINATE_SESSION</a>
        </div>
        <div id="labels-container"></div> 
        <div class="scroll-indicator">▼ SCROLL TO TRAVEL ▼</div>
    </div>

    <script>
        let scene, camera, renderer, particles;
        const projects = [];
        const labelContainer = document.getElementById('labels-container');

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.04);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.8, 25); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. NOTICEABLE CYBER TUNNEL (Glowing Beams)
            // We create 4 main glowing pillars that define the space
            const beamGeo = new THREE.BoxGeometry(0.2, 0.2, 600);
            const beamMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });

            const beamPositions = [
                {x: -12, y: 0}, {x: 12, y: 0}, // Floor corners
                {x: -12, y: 10}, {x: 12, y: 10} // Ceiling corners
            ];

            beamPositions.forEach(pos => {
                const beam = new THREE.Mesh(beamGeo, beamMat);
                beam.position.set(pos.x, pos.y, -250);
                scene.add(beam);
            });

            // Glowing Rings (Ribs) - Now much thicker and brighter
            for(let i = 0; i < 25; i++) {
                const ringGeo = new THREE.TorusGeometry(15, 0.15, 8, 50);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.4 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.position.z = 30 - (i * 25);
                scene.add(ring);
            }

            // 2. LARGE DIGITAL RAIN (Square Particles)
            const partCount = 3000;
            const posArray = new Float32Array(partCount * 3);
            for(let i = 0; i < partCount * 3; i+=3) {
                posArray[i] = (Math.random() - 0.5) * 100;
                posArray[i+1] = (Math.random() - 0.5) * 60;
                posArray[i+2] = (Math.random() - 0.5) * 600;
            }
            const partGeo = new THREE.BufferGeometry();
            partGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            // Use a square sprite for the digital rain feel
            const partMat = new THREE.PointsMaterial({ 
                color: 0x00ffcc, 
                size: 0.4, // MUCH LARGER
                transparent: true, 
                opacity: 0.7,
                blending: THREE.AdditiveBlending 
            });
            particles = new THREE.Points(partGeo, partMat);
            scene.add(particles);

            // 3. BILLBOARDS
            const projectData = [
                { name: "Azhil Leigh Encina", sub: "- STUDENT -", z: -25, x: -6 },
                { name: "Web/App Developer", sub: "- PYTHON -", z: -90, x: 6 },
                { name: "Taguig City University", sub: "- BSCS -", z: -155, x: -6 },
                { name: "Esports Athlete", sub: "- MLBB -", z: -220, x: 6 },
                { name: "CICT", sub: "- WEB DEVELOPMENT -", z: -285, x: -6 }
            ];

            projectData.forEach(data => {
                const group = new THREE.Group();
                // Frame and Background
                const frame = new THREE.Mesh(new THREE.PlaneGeometry(9, 4.5), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true }));
                const bg = new THREE.Mesh(new THREE.PlaneGeometry(9, 4.5), new THREE.MeshBasicMaterial({ color: 0x001111, transparent: true, opacity: 0.8 }));
                group.add(bg, frame);
                group.position.set(data.x, 3, data.z);
                scene.add(group);

                const div = document.createElement('div');
                div.className = 'billboard-label';
                div.innerHTML = `<span class="label-main">${data.name}</span><span class="label-sub">${data.sub}</span>`;
                labelContainer.appendChild(div);
                projects.push({ group, element: div, zPos: data.z });
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const scrollPercent = window.scrollY / (document.body.offsetHeight - window.innerHeight);
            camera.position.z = 25 - (scrollPercent * 380);

            const speedValue = (window.scrollY * 0.25);
            document.getElementById('speed').innerText = speedValue.toFixed(0);
            
            // Make particles move toward camera based on speed
            particles.position.z = (time * 5) % 50;

            projects.forEach(p => {
                const dist = Math.abs(camera.position.z - p.zPos);
                let opacity = 0;
                
                // Wider fade range for smoother transitions
                if (dist < 50) {
                    opacity = 1 - (dist / 50);
                    if (camera.position.z < p.zPos) opacity *= 0.01; 
                }

                p.group.children.forEach(c => c.material.opacity = opacity);
                p.element.style.opacity = opacity;

                const vector = new THREE.Vector3();
                p.group.getWorldPosition(vector);
                vector.project(camera);

                if(vector.z < 1 && opacity > 0.01) {
                    p.element.style.display = 'block';
                    const x = (vector.x * .5 + .5) * window.innerWidth;
                    const y = (vector.y * -.5 + .5) * window.innerHeight;
                    p.element.style.transform = `translate(-50%, -50%) translate(${x}px,${y}px)`;
                } else {
                    p.element.style.display = 'none';
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
